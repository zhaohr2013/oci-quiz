<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OCI刷题系统</title>

<style>

body{
font-family:Arial;
padding:20px;
max-width:700px;
margin:auto;
}

h2{
margin-bottom:10px;
}

button{
padding:10px;
margin:5px 3px;
border-radius:6px;
border:1px solid #ccc;
background:#f7f7f7;
}

.option{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
text-align:left;
}

.correct{
background:#d9f7d9;
}

.wrong{
background:#ffdede;
}

.stat{
margin-top:15px;
font-weight:bold;
}

#explain{
margin-top:10px;
}

</style>

</head>

<body>

<h2>OCI刷题系统</h2>

<button onclick="toggleLang()" id="langBtn">中文</button>
<button onclick="clearProgress()">清空记录</button>

<br><br>

跳到题号
<input id="jumpInput" type="number" style="width:70px">
<button onclick="jump()">跳转</button>

<h3 id="progress"></h3>

<h3 id="question"></h3>

<div id="options"></div>
<button onclick="prev()">上一题</button>
<button onclick="next()">下一题</button>
<div id="explain"></div>
<div class="stat">
正确: <span id="correct">0</span> |
错误: <span id="wrong">0</span> |
正确率: <span id="rate">0%</span>
</div>

<script>

let questions=[]
let current=0
let lang="jp"

let answers={}
let correct=0
let wrong=0

fetch("questions.json")
.then(res=>res.json())
.then(data=>{
questions=data
loadProgress()
showQuestion()
})

function loadProgress(){

let saved=localStorage.getItem("quiz")

if(saved){

let data=JSON.parse(saved)

answers=data.answers||{}
correct=data.correct||0
wrong=data.wrong||0
current=data.current||0

}

updateStat()

}

function saveProgress(){

localStorage.setItem("quiz",JSON.stringify({
answers,
correct,
wrong,
current
}))

}

function showQuestion(){

let q=questions[current]

document.getElementById("progress").innerText=
"题目 "+(current+1)+" / "+questions.length

document.getElementById("question").innerText=
(lang==="jp"?q.jp:q.cn)

let options=(lang==="jp"?q.options_jp:q.options_cn)

let html=""

options.forEach((o,i)=>{

let cls="option"

if(answers[current]!=null){

if(i===q.answer) cls+=" correct"

else if(i===answers[current]) cls+=" wrong"

}

html+=`
<button class="${cls}" onclick="select(${i})">
${String.fromCharCode(65+i)}. ${o}
</button>
`

})

document.getElementById("options").innerHTML=html

showExplain()

}

function select(i){

if(answers[current]!=null) return

let q=questions[current]

answers[current]=i

if(i===q.answer) correct++
else wrong++

updateStat()

saveProgress()

showQuestion()

}

function showExplain(){

let q=questions[current]

if(answers[current]==null){

document.getElementById("explain").innerHTML=""
return

}

let explain=(lang==="jp"?q.explain_jp:q.explain_cn)

if(answers[current]==q.answer){

document.getElementById("explain").innerHTML=""
}else{

document.getElementById("explain").innerHTML=
"<b>解析:</b><br>"+explain

}

}

function next(){

if(current<questions.length-1){

current++
saveProgress()
showQuestion()

}

}

function prev(){

if(current>0){

current--
saveProgress()
showQuestion()

}

}

function jump(){

let n=parseInt(document.getElementById("jumpInput").value)

if(n>=1 && n<=questions.length){

current=n-1
saveProgress()
showQuestion()

}

}

function toggleLang(){

if(lang==="jp"){

lang="cn"
document.getElementById("langBtn").innerText="日本語"

}else{

lang="jp"
document.getElementById("langBtn").innerText="中文"

}

showQuestion()

}

function updateStat(){

document.getElementById("correct").innerText=correct
document.getElementById("wrong").innerText=wrong

let total=correct+wrong

let rate=total?Math.round(correct/total*100):0

document.getElementById("rate").innerText=rate+"%"

}

function clearProgress(){

if(confirm("确定清空所有做题记录？")){

localStorage.removeItem("quiz")

answers={}
correct=0
wrong=0
current=0

updateStat()
showQuestion()

}

}

</script>

</body>
</html>
