<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OCI刷题系统</title>
<style>

body{
font-family:Arial;
padding:20px;
max-width:700px;
margin:auto;
}

h3{
text-align:left;
}

button{
width:100%;
padding:12px;
margin:6px 0;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
background:#f7f7f7;
text-align:left;
}

.correct{
background:#d9f7d9;
}

.wrong{
background:#ffdede;
}

.nav{
display:flex;
gap:10px;
}

.nav button{
width:50%;
}

.stat{
margin-top:15px;
font-weight:bold;
}

#result{
margin-top:10px;
font-size:16px;
white-space:pre-line;
}

.topButtons{
display:flex;
gap:10px;
margin-bottom:10px;
}

.topButtons button{
width:50%;
text-align:center;
}

.jumpBox{
margin-top:10px;
}

</style>
</head>
<body>
<h2>OCI刷题系统</h2>
<div class="topButtons">
<button id="langBtn" onclick="toggleLang()">中文</button>
<button onclick="clearProgress()">清空记录</button>
</div>
<div class="jumpBox">
跳到题号:
<input id="jumpInput" type="number" style="width:80px;">
<button onclick="jump()">跳转</button>
</div>
<h3 id="question">加载题库中...</h3>
<div id="options"></div>
<p id="result"></p>
<div class="nav">
<button onclick="prev()">上一题</button>
<button onclick="next()">下一题</button>
</div>
<div class="stat">
正确: <span id="correct">0</span> |
错误: <span id="wrong">0</span> |
正确率: <span id="rate">0%</span>
</div>
<script>

let lang="jp"
let current=0
let correct=0
let wrong=0
let answers={}

loadProgress()

/* 题库直接写在这里 */

let questions=[

{
"jp":"OCI Object Storageにおいて、標準階層からアーカイブ階層に移動した場合の影響は？",
"cn":"在 OCI 对象存储中，将对象从标准层移动到归档层有什么影响？",

"options_jp":[
"ストレージコストが増加する",
"即時アクセスできず復元が必要になる",
"耐久性が低下する",
"読み取り専用になる"
],

"options_cn":[
"存储成本增加",
"无法立即访问，需要恢复",
"耐久性降低",
"对象变为只读"
],

"answer":1,

"explain_jp":"Archive階層は低コストですが、取得には復元処理が必要です。",
"explain_cn":"归档层成本低，但访问前需要执行恢复操作。"
},

{
"jp":"OCI Tenancyとは何ですか？",
"cn":"OCI Tenancy 是什么？",

"options_jp":[
"リージョン",
"クラウド内の顧客専用領域",
"仮想マシン",
"バックアップ"
],

"options_cn":[
"区域",
"客户在云中的独立空间",
"虚拟机",
"备份"
],

"answer":1,

"explain_jp":"TenancyはOCIリソースを管理する最上位の単位です。",
"explain_cn":"Tenancy 是 OCI 资源管理的最高级单位。"
}

]

/* 显示题目 */

function showQuestion(){

let q=questions[current]

document.getElementById("result").innerText=""

let title=lang==="jp"?q.jp:q.cn

document.getElementById("question").innerText=
"问题 "+(current+1)+" / "+questions.length+"  "+title

let opts=lang==="jp"?q.options_jp:q.options_cn

let html=""

opts.forEach((o,i)=>{

html+=`<button onclick="check(${i})" id="opt${i}">
${String.fromCharCode(65+i)}. ${o}
</button>`

})

document.getElementById("options").innerHTML=html

if(answers[current]!==undefined){

showSavedAnswer()

}

saveProgress()

}

function check(i){

let q=questions[current]

answers[current]=i

for(let k=0;k<q.options_jp.length;k++){
document.getElementById("opt"+k).disabled=true
}

if(i===q.answer){

document.getElementById("opt"+i).classList.add("correct")
correct++

}else{

document.getElementById("opt"+i).classList.add("wrong")
document.getElementById("opt"+q.answer).classList.add("correct")
wrong++

}

let explanation = lang==="jp"? q.explain_jp : q.explain_cn

document.getElementById("result").innerText=
"正确答案: "+String.fromCharCode(65+q.answer)+"\n解析: "+explanation

updateStat()
saveProgress()

}

function showSavedAnswer(){

let q=questions[current]

let i=answers[current]

for(let k=0;k<q.options_jp.length;k++){
document.getElementById("opt"+k).disabled=true
}

if(i===q.answer){

document.getElementById("opt"+i).classList.add("correct")

}else{

document.getElementById("opt"+i).classList.add("wrong")
document.getElementById("opt"+q.answer).classList.add("correct")

}

}

function next(){

if(current<questions.length-1){

current++
showQuestion()

}

}

function prev(){

if(current>0){

current--
showQuestion()

}

}

function toggleLang(){

if(lang==="jp"){

lang="cn"
document.getElementById("langBtn").innerText="日本語"

}else{

lang="jp"
document.getElementById("langBtn").innerText="中文"

}

showQuestion()

}

function jump(){

let n=document.getElementById("jumpInput").value

n=parseInt(n)

if(n>=1 && n<=questions.length){

current=n-1
showQuestion()

}else{

alert("题号无效")

}

}

function clearProgress(){

if(confirm("确定清空记录吗？")){

localStorage.clear()

answers={}
correct=0
wrong=0
current=0

updateStat()
showQuestion()

}

}

function updateStat(){

document.getElementById("correct").innerText=correct
document.getElementById("wrong").innerText=wrong

let total=correct+wrong
let rate=total?Math.round(correct/total*100):0

document.getElementById("rate").innerText=rate+"%"

}

function saveProgress(){

localStorage.setItem("oci_current",current)
localStorage.setItem("oci_correct",correct)
localStorage.setItem("oci_wrong",wrong)
localStorage.setItem("oci_answers",JSON.stringify(answers))

}

function loadProgress(){

let c=localStorage.getItem("oci_current")
let co=localStorage.getItem("oci_correct")
let w=localStorage.getItem("oci_wrong")
let a=localStorage.getItem("oci_answers")

if(c) current=parseInt(c)
if(co) correct=parseInt(co)
if(w) wrong=parseInt(w)
if(a) answers=JSON.parse(a)

updateStat()

}

showQuestion()

</script>
