<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OCI刷题系统 Ultimate</title>

<style>

body{
font-family:Arial;
padding:20px;
max-width:900px;
margin:auto;
}

h3{
text-align:left;
font-size:2vw;
}

button{
padding:12px;
margin:6px 4px;
border-radius:8px;
border:1px solid #ccc;
background:#f7f7f7;
font-size:2.5vw;
}

.option{
width:100%;
padding:6px 10px;
margin:2px 0;
border-radius:6px;
border:1px solid #ccc;
text-align:left;
font-size:2vw;
}

.correct{
background:#d9f7d9;
}

.wrong{
background:#ffdede;
}

.selected{
background:#e6f0ff;
}

.card{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:10px;
}

.card button{
width:45px;
height:40px;
}

.done{
background:#d9f7d9;
}

.error{
background:#ffdede;
}

</style>

</head>

<body>

<h2>OCI刷题系统</h2>

<div>

<button onclick="mode='order';start()">顺序练习</button>
<button onclick="mode='random';start()">随机练习</button>
<button onclick="mode='wrong';start()">错题模式</button>

<button onclick="toggleLang()" id="langBtn">中文</button>

<button onclick="clearProgress()">清空记录</button>

</div>

<h3 id="progress"></h3>
<h3 id="question"></h3>

<div id="options"></div>

<button id="submitBtn" onclick="submitAnswer()">提交答案</button>

<button onclick="prev()">上一题</button>
<button onclick="next()">下一题</button>

<div id="explain"></div>

<div>
正确: <span id="correct">0</span> |
错误: <span id="wrong">0</span> |
正确率: <span id="rate">0%</span>
</div>

<h3>答题卡</h3>
<div class="card" id="card"></div>

<script>

let questions=[]
let list=[]

let current=0
let lang="jp"
let mode="order"

let selected=[]

let answers={}
let wrongQuestions=[]

let correct=0
let wrong=0

fetch("questions.json")
.then(res=>res.json())
.then(data=>{
questions=data
loadData()
start()
})

function loadData(){

answers=JSON.parse(localStorage.getItem("answers")||"{}")
wrongQuestions=JSON.parse(localStorage.getItem("wrong")||"[]")

correct=parseInt(localStorage.getItem("correct")||0)
wrong=parseInt(localStorage.getItem("wrongCount")||0)

updateStat()

}

function saveData(){

localStorage.setItem("answers",JSON.stringify(answers))
localStorage.setItem("wrong",JSON.stringify(wrongQuestions))
localStorage.setItem("correct",correct)
localStorage.setItem("wrongCount",wrong)

}

function start(){

if(mode==="order"){
list=[...questions.keys()]
}

if(mode==="random"){
list=[...questions.keys()].sort(()=>Math.random()-0.5)
}

if(mode==="wrong"){
list=[...wrongQuestions]
}

current=0

renderCard()
showQuestion()

}

function showQuestion(){

let q=questions[list[current]]

selected = answers[list[current]] ? [...answers[list[current]]] : []

document.getElementById("progress").innerText=
"题目 "+(current+1)+" / "+list.length

document.getElementById("question").innerText=
(lang==="jp"?q.jp:q.cn)

let options=(lang==="jp"?q.options_jp:q.options_cn)

let html=""

options.forEach((o,i)=>{

html+=`<button class="option" id="opt${i}" onclick="selectOption(${i})">
${String.fromCharCode(65+i)}. ${o}
</button>`

})

document.getElementById("options").innerHTML=html

// 恢复历史选择
selected.forEach(i=>{
let btn=document.getElementById("opt"+i)
if(btn){
btn.classList.add("selected")
}
})
  
document.getElementById("explain").innerHTML=""

let isMulti=Array.isArray(q.answer)

document.getElementById("submitBtn").style.display=
isMulti?"inline-block":"none"

if(answers[list[current]]){

judgeRestore()

}
}

function judgeRestore(){

let q=questions[list[current]]

let correctAnswer=Array.isArray(q.answer)?q.answer:[q.answer]

correctAnswer.forEach(a=>{
let btn=document.getElementById("opt"+a)
if(btn) btn.classList.add("correct")
})

selected.forEach(a=>{
if(!correctAnswer.includes(a)){
let btn=document.getElementById("opt"+a)
if(btn) btn.classList.add("wrong")
}
})

let explain=(lang==="jp"?q.explain_jp:q.explain_cn)

document.getElementById("explain").innerHTML=
"<b>正确答案:</b> "+correctAnswer.map(a=>String.fromCharCode(65+a)).join(",")+
"<br><br><b>解析:</b><br>"+explain

}


function selectOption(i){

let q=questions[list[current]]

let isMulti=Array.isArray(q.answer)

if(!isMulti){

selected=[i]

judge()

return

}

let btn=document.getElementById("opt"+i)

if(selected.includes(i)){

selected=selected.filter(x=>x!==i)
btn.classList.remove("selected")

}else{

selected.push(i)
btn.classList.add("selected")

}

}

function submitAnswer(){

judge()

}

function judge(){

let q=questions[list[current]]

let correctAnswer=Array.isArray(q.answer)?q.answer:[q.answer]

let ok=selected.sort().toString()==correctAnswer.sort().toString()

correctAnswer.forEach(a=>{
document.getElementById("opt"+a).classList.add("correct")
})

selected.forEach(a=>{
if(!correctAnswer.includes(a)){
document.getElementById("opt"+a).classList.add("wrong")
}
})

if(ok){
correct++
}else{
wrong++

if(mode !== "wrong"){
if(!wrongQuestions.includes(list[current])){
wrongQuestions.push(list[current])
}
}


  
}

let explain=(lang==="jp"?q.explain_jp:q.explain_cn)

document.getElementById("explain").innerHTML=
"<b>正确答案:</b> "+correctAnswer.map(a=>String.fromCharCode(65+a)).join(",")+
"<br><br><b>解析:</b><br>"+explain

answers[list[current]]=selected

updateStat()
saveData()
renderCard()

if(ok){

setTimeout(()=>{
next()
},800)

}

}

function renderCard(){

let html=""

list.forEach((q,i)=>{

let cls=""

if(answers[q]){

let ans=answers[q]

let ca=Array.isArray(questions[q].answer)?
questions[q].answer:[questions[q].answer]

if(ans.sort().toString()==ca.sort().toString()){
cls="done"
}else{
cls="error"
}

}

html+=`<button class="${cls}" onclick="jump(${i})">${i+1}</button>`

})

document.getElementById("card").innerHTML=html

}

function jump(i){

current=i
showQuestion()

}

function next(){

if(current<list.length-1){
current++
showQuestion()
}

}

function prev(){

if(current>0){
current--
showQuestion()
}

}

function toggleLang(){

if(lang==="jp"){
lang="cn"
document.getElementById("langBtn").innerText="日本語"
}else{
lang="jp"
document.getElementById("langBtn").innerText="中文"
}

showQuestion()

}

function updateStat(){

document.getElementById("correct").innerText=correct
document.getElementById("wrong").innerText=wrong

let total=correct+wrong

let rate=total?Math.round(correct/total*100):0

document.getElementById("rate").innerText=rate+"%"

}

function clearProgress(){

if(confirm("确定清空所有记录？")){

localStorage.clear()

answers={}
wrongQuestions=[]

correct=0
wrong=0

updateStat()

start()

}

}

</script>

</body>
</html>
