<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OCI刷题系统</title>

<style>

body{
font-family:Arial;
padding:20px;
max-width:650px;
margin:auto;
}

h3{
text-align:left;
}

button{
width:100%;
padding:12px;
margin:6px 0;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
background:#f7f7f7;
text-align:left;
}

.correct{
background:#d9f7d9;
}

.wrong{
background:#ffdede;
}

.nav{
display:flex;
gap:10px;
}

.stat{
margin-top:15px;
font-weight:bold;
}

#result{
margin-top:10px;
font-size:16px;
white-space:pre-line;
}

</style>

</head>

<body>

<h2>OCI刷题系统</h2>

<button id="langBtn" onclick="toggleLang()">中文</button>

<h3 id="question">加载题库中...</h3>

<div id="options"></div>

<p id="result"></p>

<div class="nav">
<button onclick="prev()">上一题</button>
<button onclick="next()">下一题</button>
</div>

<div class="stat">
正确: <span id="correct">0</span> |
错误: <span id="wrong">0</span> |
正确率: <span id="rate">0%</span>
</div>

<script>

let lang="jp"
let questions=[]
let current=0

// 保存用户答案
let answers=JSON.parse(localStorage.getItem("answers")||"{}")

fetch("questions.json")
.then(res=>res.json())
.then(data=>{
questions=data
showQuestion()
updateStat()
})

function showQuestion(){

if(questions.length===0) return

let q=questions[current]

document.getElementById("result").innerText=""

let title=lang==="jp"?q.jp:q.cn

document.getElementById("question").innerText=
"问题 "+(current+1)+" / "+questions.length+"  "+title

let opts=lang==="jp"?q.options_jp:q.options_cn

let html=""

opts.forEach((o,i)=>{

html+=`<button onclick="check(${i})" id="opt${i}">
${String.fromCharCode(65+i)}. ${o}
</button>`

})

document.getElementById("options").innerHTML=html

// 恢复之前选择的答案
if(answers[current]!=null){

let user=answers[current]
let q=questions[current]

document.getElementById("opt"+user).classList.add(
user===q.answer?"correct":"wrong"
)

document.getElementById("opt"+q.answer).classList.add("correct")

showExplain()

disableOptions()

}

}

function check(i){

let q=questions[current]

// 已经做过不再重复统计
if(answers[current]!=null) return

answers[current]=i

localStorage.setItem("answers",JSON.stringify(answers))

if(i===q.answer){

document.getElementById("opt"+i).classList.add("correct")

}else{

document.getElementById("opt"+i).classList.add("wrong")

document.getElementById("opt"+q.answer).classList.add("correct")

}

showExplain()

disableOptions()

updateStat()

}

function showExplain(){

let q=questions[current]

let explanation = lang==="jp"? q.explain_jp : q.explain_cn

document.getElementById("result").innerText=
"正确答案: "+String.fromCharCode(65+q.answer)+"\n解析: "+explanation

}

function disableOptions(){

let q=questions[current]

for(let k=0;k<q.options_jp.length;k++){
document.getElementById("opt"+k).disabled=true
}

}

function next(){

if(current<questions.length-1){
current++
showQuestion()
}

}

function prev(){

if(current>0){
current--
showQuestion()
}

}

function toggleLang(){

if(lang==="jp"){

lang="cn"
document.getElementById("langBtn").innerText="日本語"

}else{

lang="jp"
document.getElementById("langBtn").innerText="中文"

}

showQuestion()

}

function updateStat(){

let correct=0
let wrong=0

questions.forEach((q,i)=>{

if(answers[i]!=null){

if(answers[i]===q.answer){
correct++
}else{
wrong++
}

}

})

document.getElementById("correct").innerText=correct
document.getElementById("wrong").innerText=wrong

let total=correct+wrong
let rate=total?Math.round(correct/total*100):0

document.getElementById("rate").innerText=rate+"%"

}

</script>

</body>
</html>
